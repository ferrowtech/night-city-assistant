name: Update Knowledge Base

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  update-kb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run knowledge base updater
        run: python scripts/update_kb.py

      - name: Commit updated knowledge base if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cyberpunk_2077_knowledge_base.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main
            git commit -m "auto: update knowledge base from Cyberpunk Wiki $(date +'%Y-%m-%d')"
            git push
          fi
